# A basic inheritable template for a gun that is wieldable and has the standard inaccuracy.
- type: entity
  id: BaseGunWieldable
  abstract: true
  components:
  - type: Wieldable
    unwieldOnUse: false
  - type: GunWieldBonus
    minAngle: -20
    maxAngle: -30
  - type: Gun
    minAngle: 21
    maxAngle: 32
  #WL-Changes start
  - type: GunStandingRequired
  - type: MeleeWeapon
    wideAnimationRotation: 135
    damage:
      types:
        Blunt: 8
    angle: 45
    animation: WeaponArcThrust
    soundHit:
      collection: MetalThud
  - type: MeleeRequiresWield
  - type: AltFireMelee
    attackType: Heavy
  #WL-Changes end
